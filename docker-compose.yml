services:
  app:
    image: node:18
    command: sh -c "npm install && npm start"
    working_dir: /app
    volumes:
      - ./src:/app
    ports:
      - "3000:3000"
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
  loki:
    image: grafana/loki
    ports:
      - "3100:3100"
  promtail:
    image: grafana/promtail
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml
      - /var/log:/var/log
    depends_on:
      - loki
